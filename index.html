<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Ossie Indoor — Superleague</title>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      background: #06061a;
      color: #fff;
      font-family: 'Segoe UI', Arial, sans-serif;
      height: 100vh;
      overflow: hidden;
      display: flex;
      flex-direction: column;
    }

    header {
      background: #0d0d2b;
      border-bottom: 3px solid #e5312b;
      padding: 10px 28px;
      display: flex;
      align-items: center;
      justify-content: space-between;
      flex-shrink: 0;
    }

    .header-left {
      display: flex;
      align-items: center;
      gap: 14px;
      flex: 1;
      justify-content: center;
    }

    .header-logo {
      font-size: 2rem;
    }

    .header-titles {
      display: flex;
      flex-direction: column;
      align-items: center;
      text-align: center;
    }

    .header-main {
      font-size: 1.4rem;
      font-weight: 800;
      letter-spacing: 1px;
      line-height: 1.1;
    }

    .header-sub {
      font-size: 0.7rem;
      color: #e5312b;
      font-weight: 700;
      letter-spacing: 3px;
      text-transform: uppercase;
    }

    .header-right {
      display: flex;
      flex-direction: column;
      align-items: flex-end;
      gap: 2px;
    }

    .clock {
      font-size: 1.6rem;
      font-weight: 700;
      color: #e5312b;
      font-variant-numeric: tabular-nums;
    }

    .date-label {
      font-size: 0.65rem;
      color: #556;
      letter-spacing: 1px;
      text-transform: uppercase;
    }

    /* Rounds wrapper */
    .rounds-wrapper {
      flex: 1;
      display: flex;
      flex-direction: column;
      gap: 3px;
      background: #1a1a33;
      overflow: hidden;
    }

    .round-panel {
      display: flex;
      flex-direction: column;
      background: #08081e;
      overflow: hidden;
      min-height: 0;
    }

    .round-panel.is-current { flex-shrink: 0; height: 37vh; }
    .round-panel.is-next    { flex-shrink: 0; height: 88px; }
    .round-panel.is-later   { flex: 1; min-height: 0; }

    .round-header {
      padding: 8px 20px;
      display: flex;
      align-items: center;
      justify-content: space-between;
      flex-shrink: 0;
    }

    .round-header.current  { background: #e5312b; }
    .round-header.next     { background: #1a1a4d; padding: 4px 12px; min-height: 0; }
    .round-header.later    { background: #101028; padding: 2px 12px; min-height: 0; }

    .round-label {
      font-size: 1rem;
      font-weight: 800;
      letter-spacing: 2px;
      text-transform: uppercase;
    }

    .round-panel.is-next .round-label   { font-size: 0.7rem; }
    .round-panel.is-later .round-label  { font-size: 0.6rem; }

    .round-time-block {
      display: flex;
      align-items: baseline;
      gap: 12px;
    }

    .round-time {
      font-size: 1.1rem;
      font-weight: 700;
    }

    .round-panel.is-next  .round-time  { font-size: 0.7rem; }
    .round-panel.is-later .round-time  { font-size: 0.6rem; }

    .round-countdown {
      font-size: 0.8rem;
      opacity: 0.9;
      font-variant-numeric: tabular-nums;
      background: rgba(0,0,0,0.3);
      padding: 2px 8px;
      border-radius: 4px;
    }

    .round-panel.is-later .round-countdown { display: none; }

    /* Courts grid */
    .courts-row {
      flex: 1;
      display: grid;
      grid-template-columns: repeat(4, 1fr);
      grid-template-rows: repeat(2, 1fr);
      min-height: 0;
      overflow: hidden;
    }

    .courts-row.inline-fixtures {
      display: flex;
      flex-direction: row;
      height: auto;
    }

    .court-cell {
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      padding: 4px 6px;
      border-right: 1px solid #1a1a33;
      border-bottom: 1px solid #1a1a33;
      text-align: center;
      gap: 3px;
    }

    .court-cell:nth-child(4n)   { border-right: none; }
    .court-cell:nth-child(n+5)  { border-bottom: none; }

    .court-cell.inline {
      flex: 1;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      padding: 4px 6px;
      gap: 1px;
      border-right: 1px solid #1a1a33;
      border-bottom: none;
      min-width: 0;
    }

    .court-cell.inline:last-child { border-right: none; }

    /* Division colour bar */
    .div-bar {
      width: 36px;
      height: 3px;
      border-radius: 2px;
      margin-bottom: 2px;
      opacity: 0.85;
    }

    .court-tag {
      font-size: 0.6rem;
      color: #aaa;
      font-weight: 700;
      letter-spacing: 1px;
      text-transform: uppercase;
    }

    .court-cell.inline .court-tag { font-size: 0.5rem; color: #666; white-space: nowrap; }

    .team-name {
      font-size: 0.88rem;
      font-weight: 800;
      line-height: 1.1;
      word-break: break-word;
    }

    .div-label {
      font-size: 0.55rem;
      color: #556;
      font-weight: 600;
      letter-spacing: 1px;
    }

    .court-cell.inline .matchup {
      font-size: 0.72rem;
      font-weight: 700;
      white-space: nowrap;
      overflow: hidden;
      text-overflow: ellipsis;
      color: #eee;
      width: 100%;
      text-align: center;
    }

    .vs-badge {
      font-size: 0.55rem;
      color: #e5312b;
      font-weight: 700;
      letter-spacing: 2px;
    }

    /* Bye strip */
    .bye-strip {
      flex-shrink: 0;
      background: #06061a;
      border-top: 1px solid #1a1a33;
      padding: 4px 20px;
      display: flex;
      align-items: center;
      gap: 8px;
      flex-wrap: wrap;
    }

    .bye-label {
      font-size: 0.6rem;
      color: #444;
      font-weight: 700;
      letter-spacing: 1px;
      text-transform: uppercase;
      flex-shrink: 0;
    }

    .bye-team {
      font-size: 0.6rem;
      color: #444;
      font-weight: 600;
      background: #0f0f22;
      border: 1px solid #1a1a33;
      padding: 1px 7px;
      border-radius: 3px;
    }

    .done-state {
      flex: 1;
      display: flex;
      align-items: center;
      justify-content: center;
      color: #222;
      font-size: 1.2rem;
      font-weight: 700;
      letter-spacing: 2px;
    }

    .loading-state {
      flex: 1;
      display: flex;
      align-items: center;
      justify-content: center;
      flex-direction: column;
      gap: 12px;
      color: #444;
    }

    .loading-spinner {
      width: 40px;
      height: 40px;
      border: 3px solid #1a1a33;
      border-top-color: #e5312b;
      border-radius: 50%;
      animation: spin 0.8s linear infinite;
    }

    @keyframes spin { to { transform: rotate(360deg); } }

    .error-state {
      flex: 1;
      display: flex;
      align-items: center;
      justify-content: center;
      color: #e5312b;
      font-size: 0.9rem;
      font-weight: 700;
      letter-spacing: 1px;
    }
  </style>
</head>
<body>

<header>
  <div class="header-left">
    <div class="header-titles">
      <div class="header-main" id="pageTitle">2026 SUPERLEAGUE ROUND 3</div>
      <div class="header-sub" id="pageSubtitle">OSSIE INDOOR BEACH VOLLEYBALL</div>
    </div>
  </div>
  <div class="header-right">
    <div class="clock" id="clock">--:--:--</div>
    <div class="date-label" id="dateLabel">--</div>
  </div>
</header>

<div class="rounds-wrapper" id="roundsWrapper">
  <div class="round-panel is-current" id="panelA">
    <div class="loading-state">
      <div class="loading-spinner"></div>
      <div>Loading fixtures...</div>
    </div>
  </div>
  <div class="round-panel is-next"  id="panelB"></div>
  <div class="round-panel is-later" id="panelC"></div>
  <div class="round-panel is-later" id="panelD"></div>
  <div class="round-panel is-later" id="panelE"></div>
  <div class="round-panel is-later" id="panelF"></div>
</div>

<script>
// ───────────────────────────────────────────────
// Config
// ───────────────────────────────────────────────
const SPAWTZ_URLS = [
  'https://ibvwasuperleague.spawtz.com/External/Fixtures/Feed.aspx?Type=Fixtures&LeagueId=2&SeasonId=4',
  'https://ibvwasuperleague.spawtz.com/External/Fixtures/Feed.aspx?Type=Fixtures&LeagueId=4&SeasonId=4',
  'https://ibvwasuperleague.spawtz.com/External/Fixtures/Feed.aspx?Type=Fixtures&LeagueId=8&SeasonId=4',
];

// Division colours (matching Spawtz CalendarColour)
const DIV_COLOURS = {
  'FFFFCC': '#d4a017',  // DIV 1 — gold
  'CCFFCC': '#22c55e',  // DIV 2 — green
  '99CCFF': '#3b82f6',  // DIV 3 — blue
  'FF9966': '#f97316',  // DIV 4 — orange
  '9999FF': '#8b5cf6',  // DIV 5 — purple
};

// ───────────────────────────────────────────────
// State
// ───────────────────────────────────────────────
let rounds = {};       // { "17:30": [{court, teamA, teamB, div, divColour}] }
let roundTimes = [];   // sorted time strings
let ALL_TEAMS = [];
let lastIdx = -1;
let loaded = false;

// ───────────────────────────────────────────────
// Fetch + Parse
// ───────────────────────────────────────────────

function getTodayStr() {
  const d = new Date();
  const dd = String(d.getDate()).padStart(2,'0');
  const mm = String(d.getMonth()+1).padStart(2,'0');
  const yyyy = d.getFullYear();
  return `${dd}/${mm}/${yyyy}`;
}

function getTargetDateStr() {
  // Use today if there are fixtures today, otherwise find next Saturday
  // We'll figure this out after fetching data.
  // For now return today's date string (DD/MM/YYYY).
  return getTodayStr();
}

async function fetchXML(url) {
  // Try direct fetch first, then CORS proxy fallback
  try {
    const res = await fetch(url, { signal: AbortSignal.timeout(8000) });
    if (!res.ok) throw new Error('HTTP ' + res.status);
    return await res.text();
  } catch(e) {
    // CORS proxy fallback
    try {
      const proxy = 'https://api.allorigins.win/raw?url=' + encodeURIComponent(url);
      const res = await fetch(proxy, { signal: AbortSignal.timeout(12000) });
      if (!res.ok) throw new Error('Proxy HTTP ' + res.status);
      return await res.text();
    } catch(e2) {
      console.warn('Failed to fetch', url, e2);
      return null;
    }
  }
}

function parseXML(xml) {
  // Parse Spawtz XML — returns array of fixture objects
  const fixtures = [];
  if (!xml) return fixtures;
  const parser = new DOMParser();
  const doc = parser.parseFromString(xml, 'text/xml');
  doc.querySelectorAll('Fixture').forEach(f => {
    const dateTime = f.getAttribute('DateTime');       // "28/06/2026 17:30"
    const court = f.getAttribute('PlayingAreaName');   // "Court 1"
    const home = f.getAttribute('HomeTeam');
    const away = f.getAttribute('AwayTeam');
    const div = f.getAttribute('DivisionName') || '';
    const colour = (f.getAttribute('CalendarColour') || '').trim().replace(/[\r\n]/g,'');
    if (!dateTime || !home || !away) return;
    const [datePart, timePart] = dateTime.split(' ');
    fixtures.push({ datePart, timePart, court, teamA: home.trim(), teamB: away.trim(), div, colour });
  });
  return fixtures;
}

async function loadFixtures() {
  const allFixtures = [];

  // Fetch all URLs in parallel
  const results = await Promise.all(SPAWTZ_URLS.map(fetchXML));
  results.forEach(xml => {
    if (xml) parseXML(xml).forEach(f => allFixtures.push(f));
  });

  if (allFixtures.length === 0) return false;

  // Always show Saturday 27/06/2026 fixtures
  const targetDate = '27/06/2026';

  const filtered = allFixtures.filter(f => f.datePart === targetDate);
  if (!filtered.length) return false;

  // Update date display
  const dateObj = new Date(parseDate(targetDate));
  document.getElementById('dateLabel').textContent = dateObj.toLocaleDateString('en-AU', {
    weekday: 'long', day: 'numeric', month: 'long', year: 'numeric'
  }).toUpperCase();

  // Build rounds map
  rounds = {};
  filtered.forEach(({ timePart, court, teamA, teamB, div, colour }) => {
    const t = formatTime(timePart); // "17:30" → "5:30 PM"
    if (!rounds[t]) rounds[t] = [];
    // Deduplicate
    const key = `${court}|${teamA}|${teamB}`;
    if (!rounds[t].find(r => `${r.court}|${r.teamA}|${r.teamB}` === key)) {
      rounds[t].push({ court, teamA, teamB, div, colour });
    }
  });

  // Sort courts within each round
  Object.values(rounds).forEach(r => r.sort((a, b) => {
    const na = parseInt(a.court.replace(/\D/g, '')) || 0;
    const nb = parseInt(b.court.replace(/\D/g, '')) || 0;
    return na - nb;
  }));

  // Sort round times
  roundTimes = Object.keys(rounds).sort((a, b) => parseTimeToMs(a) - parseTimeToMs(b));

  // All teams
  ALL_TEAMS = [...new Set(filtered.flatMap(f => [f.teamA, f.teamB]))].sort();

  return true;
}

// ───────────────────────────────────────────────
// Time helpers
// ───────────────────────────────────────────────

function parseDate(ddmmyyyy) {
  const [dd, mm, yyyy] = ddmmyyyy.split('/').map(Number);
  return new Date(yyyy, mm - 1, dd).getTime();
}

function formatTime(hhmm) {
  // Convert "17:30" → "5:30 PM"
  let [h, m] = hhmm.split(':').map(Number);
  const period = h >= 12 ? 'PM' : 'AM';
  const hh = h % 12 || 12;
  return `${hh}:${String(m).padStart(2,'0')} ${period}`;
}

function parseTimeToMs(str) {
  // "5:30 PM" → ms since midnight
  const [time, period] = str.trim().split(' ');
  let [h, m] = time.split(':').map(Number);
  if (period === 'PM' && h !== 12) h += 12;
  if (period === 'AM' && h === 12) h = 0;
  return h * 3600000 + m * 60000;
}

function parseTimeToDate(str) {
  const today = new Date();
  const ms = parseTimeToMs(str);
  return new Date(today.getFullYear(), today.getMonth(), today.getDate(),
    Math.floor(ms / 3600000),
    Math.floor((ms % 3600000) / 60000));
}

function getCurrentRoundIndex() {
  const now = new Date();
  let idx = -1;
  for (let i = 0; i < roundTimes.length; i++) {
    if (parseTimeToDate(roundTimes[i]) <= now) idx = i;
  }
  return idx < 0 ? 0 : idx;
}

function formatCountdown(targetDate) {
  const diff = targetDate - new Date();
  if (diff <= 0) {
    const e = Math.abs(diff);
    const m = Math.floor(e / 60000);
    const s = Math.floor((e % 60000) / 1000);
    return `IN PROGRESS · ${m}:${s.toString().padStart(2,'0')} elapsed`;
  }
  const m = Math.floor(diff / 60000);
  const s = Math.floor((diff % 60000) / 1000);
  return `Starts in ${m}:${s.toString().padStart(2,'0')}`;
}

// ───────────────────────────────────────────────
// Rendering
// ───────────────────────────────────────────────

function getDivColour(colour) {
  if (!colour) return '#333';
  const clean = colour.toUpperCase().replace(/[^0-9A-F]/g, '');
  return DIV_COLOURS[clean] || '#333';
}

function getByes(roundIdx) {
  if (roundIdx >= roundTimes.length) return [];
  const playing = new Set();
  rounds[roundTimes[roundIdx]].forEach(({ teamA, teamB }) => {
    playing.add(teamA); playing.add(teamB);
  });
  return ALL_TEAMS.filter(t => !playing.has(t));
}

function renderPanel(panelEl, roundIdx, role) {
  if (roundIdx >= roundTimes.length) {
    panelEl.innerHTML = role === 'current' ? '<div class="done-state">ALL DONE — GREAT GAMES! 🏐</div>' : '';
    return;
  }

  const time = roundTimes[roundIdx];
  const matches = rounds[time];
  const roundNum = roundIdx + 1;
  const byes = getByes(roundIdx);
  const isCurrent = role === 'current';
  const isNext = role === 'next';
  const headerClass = isCurrent ? 'current' : isNext ? 'next' : 'later';
  const label = isCurrent ? `▶ NOW PLAYING — Round ${roundNum}` : `Round ${roundNum}`;

  let cells, courtsClass;

  if (isCurrent) {
    courtsClass = 'courts-row';
    cells = matches.map(({ court, teamA, teamB, div, colour }) => {
      const divColour = getDivColour(colour);
      const courtNum = court.replace(/[^0-9]/g, '');
      return `
        <div class="court-cell">
          <div class="court-tag">Court ${courtNum}</div>
          <div class="div-bar" style="background:${divColour}"></div>
          <div class="team-name">${teamA}</div>
          <div class="vs-badge">VS</div>
          <div class="team-name">${teamB}</div>
          ${div ? `<div class="div-label">${div}</div>` : ''}
        </div>
      `;
    }).join('');
  } else {
    courtsClass = 'courts-row inline-fixtures';
    cells = matches.map(({ court, teamA, teamB, colour }) => {
      const courtNum = court.replace(/[^0-9]/g, '');
      const divColour = getDivColour(colour);
      return `
        <div class="court-cell inline" style="border-bottom: 2px solid ${divColour}20">
          <div class="court-tag" style="color:${divColour}">C${courtNum}</div>
          <div class="matchup">${teamA} <span style="color:#e5312b;font-size:0.45rem">v</span> ${teamB}</div>
        </div>
      `;
    }).join('');
  }

  panelEl.innerHTML = `
    <div class="round-header ${headerClass}">
      <div class="round-label">${label}</div>
      <div class="round-time-block">
        <div class="round-time">${time}</div>
        <div class="round-countdown" id="countdown-${roundIdx}"></div>
      </div>
    </div>
    <div class="${courtsClass}">${cells}</div>
  `;
}

// ───────────────────────────────────────────────
// Clock + Tick loop
// ───────────────────────────────────────────────

function updateClock() {
  const now = new Date();
  document.getElementById('clock').textContent =
    `${String(now.getHours()).padStart(2,'0')}:${String(now.getMinutes()).padStart(2,'0')}:${String(now.getSeconds()).padStart(2,'0')}`;
}

function updateCountdowns(...idxs) {
  idxs.forEach(idx => {
    if (idx >= roundTimes.length) return;
    const el = document.getElementById(`countdown-${idx}`);
    if (el) el.textContent = formatCountdown(parseTimeToDate(roundTimes[idx]));
  });
}

function tick() {
  updateClock();
  if (!loaded) return;

  const idx = getCurrentRoundIndex();
  if (idx !== lastIdx) {
    renderPanel(document.getElementById('panelA'), idx,     'current');
    renderPanel(document.getElementById('panelB'), idx + 1, 'next');
    renderPanel(document.getElementById('panelC'), idx + 2, 'later');
    renderPanel(document.getElementById('panelD'), idx + 3, 'later');
    renderPanel(document.getElementById('panelE'), idx + 4, 'later');
    renderPanel(document.getElementById('panelF'), idx + 5, 'later');
    lastIdx = idx;
  }
  updateCountdowns(idx, idx + 1, idx + 2, idx + 3, idx + 4, idx + 5);
}

// ───────────────────────────────────────────────
// Init
// ───────────────────────────────────────────────

async function init() {
  setInterval(tick, 1000);

  try {
    const ok = await loadFixtures();
    if (ok) {
      loaded = true;
      lastIdx = -1; // force re-render
      tick();
    } else {
      document.getElementById('panelA').innerHTML =
        '<div class="error-state">NO FIXTURES FOUND FOR TODAY</div>';
    }
  } catch(e) {
    document.getElementById('panelA').innerHTML =
      '<div class="error-state">ERROR LOADING FIXTURES — ' + e.message.toUpperCase() + '</div>';
  }

  // Refresh every 5 minutes
  setInterval(async () => {
    const ok = await loadFixtures();
    if (ok) {
      loaded = true;
      lastIdx = -1;
    }
  }, 300000);
}

init();
</script>
</body>
</html>
